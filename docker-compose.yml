x-common-variables: &common-env
  CELERY_BROKER_URL: redis://redis_cache:6379/1
  REDIS_URL: redis://redis_cache:6379/2
  IS_DOCKER: 1

x-common-depends: &common-depends
  - redis_cache

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi
    command: gunicorn -k uvicorn.workers.UvicornWorker --threads 10 app:app --bind 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - internal
    depends_on: *common-depends
    environment:
      <<: *common-env

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_start worker --loglevel=info --concurrency=10
    volumes:
      - .:/app
    depends_on: *common-depends
    environment:
      <<: *common-env
    restart: unless-stopped
    networks:
      - internal

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_beat
    command: celery -A celery_start beat --loglevel=info --schedule=/app/beat-schedule
    volumes:
      - .:/app
      - ./beat-schedule:/app/beat-schedule
    depends_on: *common-depends
    environment: *common-env
    restart: unless-stopped
    networks:
      - internal

  celery_flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_flower
    command: celery -A celery_start flower
    volumes:
      - .:/app
      - ./beat-schedule:/app/beat-schedule
    depends_on: *common-depends
    environment:
      <<: *common-env
    ports:
      - "5555:5555"
    restart: unless-stopped
    networks:
      - internal

  redis_cache:
    image: redis:latest
    container_name: redis_cache
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - internal

networks:
  internal:
    driver: bridge
